<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --line-green: #06c755; --line-bg: #7494be; --mizu-black: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        
        /* ログイン・登録画面 */
        .center-content { align-items: center; justify-content: center; text-align: center; }
        .btn { width: 250px; padding: 15px; margin: 10px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        input { border-radius: 8px; border: none; padding: 15px; margin: 10px; background: var(--mizu-black); color: white; width: 80%; max-width: 300px; }

        /* 🏠 ホーム（トーク一覧） */
        #home-screen { background: #fff; color: #000; }
        .header { padding: 15px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .user-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .user-icon { width: 50px; height: 50px; border-radius: 18px; background: #eee; margin-right: 15px; }

        /* 💬 チャット画面 */
        #chat-screen { background: var(--line-bg); color: #000; }
        #chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .bubble { max-width: 70%; padding: 10px; margin: 5px; border-radius: 15px; font-size: 14px; background: #fff; align-self: flex-start; }
        .mine { align-self: flex-end; background: #8de055; }
        .input-area { background: #fff; padding: 10px; display: flex; align-items: center; padding-bottom: 80px; }

        /* 👤 プロフィール画面 */
        #profile-screen { background: #111; color: #fff; align-items: center; justify-content: center; }

        /* 📱 ナビゲーションバー（ここが重要！） */
        .nav { display: flex; justify-content: space-around; background: #fff; border-top: 1px solid #eee; padding: 15px 0; color: #000; position: fixed; bottom: 0; width: 100%; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div id="id-setup-screen" class="screen active center-content">
        <h1>MizukiConnect</h1>
        <input type="text" id="mizu-id" placeholder="マイID (英数字6文字〜)" oninput="vId()">
        <input type="text" id="mizu-name" placeholder="表示名">
        <button id="next-btn" class="btn" style="background: #fff;" onclick="goToLogin()" disabled>次へ進む</button>
    </div>

    <div id="login-screen" class="screen center-content">
        <h2>Google連携</h2>
        <div id="g_id_onload" data-client_id="391723430266-hiijbc67trrqmumu6160fj61g2nvauba.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="home-screen" class="screen">
        <div class="header">トーク <span>🔍 👤+</span></div>
        <div class="user-item" onclick="switchScreen('chat-screen')">
            <div class="user-icon"></div>
            <div><b>Mizu公式</b><br><small>ログイン成功！ここでチャットできるよ</small></div>
        </div>
        <div class="nav">
            <div onclick="switchScreen('home-screen')">🏠</div>
            <div onclick="switchScreen('chat-screen')">💬</div>
            <div onclick="switchScreen('profile-screen')">👤</div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header" style="background:#fff;">
            <span onclick="switchScreen('home-screen')">＜</span> <span>Mizu公式</span> <span>📞</span>
        </div>
        <div id="chat-area">
            <div class="bubble">ようこそ！メッセージを送ってみてね。</div>
        </div>
        <div class="input-area">
            <input type="text" id="msg-input" style="flex:1; background:#eee; color:#000;" placeholder="Aa">
            <button onclick="sendMsg()" style="color:var(--line-green); background:none; font-weight:bold; border:none; cursor:pointer;">送信</button>
        </div>
        <div class="nav">
            <div onclick="switchScreen('home-screen')">🏠</div>
            <div onclick="switchScreen('chat-screen')">💬</div>
            <div onclick="switchScreen('profile-screen')">👤</div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div id="my-info"></div>
        <button class="btn" style="background:#ff4444; color:#fff;" onclick="localStorage.clear(); location.reload();">ログアウト</button>
        <div class="nav">
            <div onclick="switchScreen('home-screen')">🏠</div>
            <div onclick="switchScreen('chat-screen')">💬</div>
            <div onclick="switchScreen('profile-screen')">👤</div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbw-E_MHkIPI8VjStwkUGjJOwdd1cPqoRJHHX-2LSt6ssL4J7bI4RXhqOjHw_WBS1KYNzw/exec";
        let tempId = "", tempName = "";

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function vId() {
            const id = document.getElementById('mizu-id').value;
            document.getElementById('next-btn').disabled = !(/^[a-zA-Z0-9]{6,20}$/.test(id));
        }

        function goToLogin() {
            tempId = document.getElementById('mizu-id').value;
            tempName = document.getElementById('mizu-name').value || "名無し";
            switchScreen('login-screen');
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            fetch(`${SHEET_URL}?email=${encodeURIComponent(payload.email)}&id=${encodeURIComponent(tempId)}&name=${encodeURIComponent(tempName)}`, { mode: 'no-cors' });
            localStorage.setItem('mizu_user', JSON.stringify({id: tempId, name: tempName}));
            switchScreen('home-screen');
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            document.getElementById('chat-area').innerHTML += `<div class="bubble mine">${input.value}</div>`;
            input.value = '';
        }

        window.onload = () => {
            if (localStorage.getItem('mizu_user')) switchScreen('home-screen');
        }
    </script>
</body>
</html>
