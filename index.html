<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect</title>
    <style>
        /* 基本スタイル */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #000; color: white; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        input, button { border-radius: 8px; border: none; padding: 12px; margin: 5px; }
        
        /* 1. 多国利用OK（スタート画面） */
        #start-screen { align-items: center; justify-content: center; background: linear-gradient(45deg, #050505, #222); }
        .lang-btn { width: 200px; margin: 10px; cursor: pointer; font-weight: bold; }

        /* 2. ID・名前設定 */
        #reg-screen { align-items: center; justify-content: center; }
        .error-msg { color: #ff3b30; font-size: 12px; height: 15px; }

        /* 3. メッセージ機能（LINE風） */
        #chat-screen { background: #7494be; }
        #chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg-bubble { max-width: 70%; padding: 10px; margin: 5px; border-radius: 15px; color: #000; position: relative; }
        .mine { align-self: flex-end; background: #8de055; }
        .others { align-self: flex-start; background: #fff; }
        .edit-btn { font-size: 10px; background: rgba(0,0,0,0.1); cursor: pointer; margin-left: 5px; }

        /* 4. プロフィール（インスタ風） */
        #profile-screen { background: #000; }
        .profile-header { display: flex; padding: 20px; align-items: center; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #333; margin-right: 20px; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #262626; }

        /* ナビゲーションバー */
        .nav-bar { display: flex; justify-content: space-around; background: #000; border-top: 1px solid #262626; padding: 10px 0; position: fixed; bottom: 0; width: 100%; }
        .nav-item { cursor: pointer; color: #fff; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1>MizukiConnect</h1>
        <button class="lang-btn" style="background:#fff;" onclick="setLang('jp')">日本語</button>
        <button class="lang-btn" style="background:#fff;" onclick="setLang('en')">English</button>
    </div>

    <div id="reg-screen" class="screen">
        <h2 id="reg-title">アカウント作成</h2>
        <input type="text" id="mizu-id" placeholder="ID (英数字6-20文字)" oninput="validateForm()">
        <div id="id-error" class="error-msg"></div>
        <input type="text" id="mizu-name" maxlength="17" placeholder="名前 (最大17文字)" oninput="validateForm()">
        <button id="submit-reg" class="lang-btn" onclick="completeReg()" disabled>スタート</button>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-area"></div>
        <div style="padding: 10px 10px 60px 10px; background: #eee; display: flex; flex-direction: column;">
            <div style="display:flex;">
                <input type="text" id="msg-input" style="flex:1; color:#000;" placeholder="メッセージ...">
                <button onclick="sendMsg()" style="background:#06c755; color:#fff;">送信</button>
            </div>
            <div style="margin-top:5px;">
                <input type="file" id="file-input" style="font-size:10px; color:#000;">
            </div>
        </div>
        <nav class="nav-bar">
            <span class="nav-item" onclick="switchScreen('chat-screen')">💬</span>
            <span class="nav-item" onclick="switchScreen('profile-screen')">👤</span>
        </nav>
    </div>

    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <div class="avatar"></div>
            <div class="stats">
                <div><b>0</b><br>投稿</div>
                <div><b>0</b><br>フォロワー</div>
                <div><b>0</b><br>フォロー中</div>
            </div>
        </div>
        <div style="padding:10px;"><b id="display-name"></b></div>
        <div class="post-grid">
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
        </div>
        <nav class="nav-bar">
            <span class="nav-item" onclick="switchScreen('chat-screen')">💬</span>
            <span class="nav-item" onclick="switchScreen('profile-screen')">👤</span>
        </nav>
    </div>

    <script>
        let userData = { id: '', name: '', lang: 'jp' };
        let messages = [];
        const SHEET_URL = "https://script.google.com/macros/s/YOUR_GAS_DEPLOY_ID/exec";

        function setLang(l) {
            userData.lang = l;
            document.getElementById('reg-title').innerText = (l === 'jp') ? 'アカウント作成' : 'Create Account';
            switchScreen('reg-screen');
        }

        function validateForm() {
            const id = document.getElementById('mizu-id').value;
            const name = document.getElementById('mizu-name').value;
            const error = document.getElementById('id-error');
            const btn = document.getElementById('submit-reg');
            
            const idRegex = /^[a-zA-Z0-9]{6,20}$/;
            const isValidId = idRegex.test(id);
            
            error.innerText = isValidId ? "" : "IDは英数字6-20文字で入力してね";
            btn.disabled = !(isValidId && name.length > 0 && name.length <= 17);
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function completeReg() {
            userData.id = document.getElementById('mizu-id').value;
            userData.name = document.getElementById('mizu-name').value;
            document.getElementById('display-name').innerText = userData.name;
            
            // スプレッドシート保存（非同期送信）
            fetch(`${SHEET_URL}?id=${userData.id}&name=${encodeURIComponent(userData.name)}&action=register`);
            switchScreen('chat-screen');
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const fileInput = document.getElementById('file-input');
            if (!input.value && !fileInput.files[0]) return;

            const msg = {
                id: Date.now(),
                text: input.value,
                time: Date.now(),
                sender: userData.name,
                hasFile: fileInput.files[0] ? fileInput.files[0].name : null
            };
            
            messages.push(msg);
            input.value = '';
            fileInput.value = '';
            renderChat();
        }

        function renderChat() {
            const area = document.getElementById('chat-area');
            area.innerHTML = '';
            const now = Date.now();

            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg-bubble mine`;
                let content = `<b>${m.sender}</b><br>${m.text}`;
                if (m.hasFile) content += `<br>📎 ${m.hasFile}`;
                
                // 24時間以内なら追記ボタン表示
                if (now - m.time < 86400000) {
                    content += ` <span class="edit-btn" onclick="addText(${m.id})">[追記]</span>`;
                }
                
                div.innerHTML = content;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        function addText(msgId) {
            const extra = prompt("追加する文字を入力してください（取り消し不可）:");
            if (extra) {
                const msg = messages.find(m => m.id === msgId);
                msg.text += " " + extra;
                renderChat();
            }
        }
    </script>
</body>
</html>
