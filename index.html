<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizukiConnect</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .btn { width: 260px; padding: 15px; margin: 10px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        input { border-radius: 8px; border: none; padding: 15px; margin: 10px; width: 80%; max-width: 300px; font-size: 16px; background: #222; color: #fff; }
        #home { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="step1" class="screen active">
        <h1>MizukiConnect</h1>
        <input type="text" id="m-id" placeholder="マイID (6文字〜)">
        <input type="text" id="m-name" placeholder="名前">
        <button class="btn" style="background:#fff;" onclick="toStep2()">次へ</button>
    </div>

    <div id="step2" class="screen">
        <h2>Googleログイン</h2>
        <div id="g_id_onload"
             data-client_id="391723430266-hiijbc67trrqmumu6160fj61g2nvauba.apps.googleusercontent.com"
             data-callback="onLogin">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
        <button class="btn" style="background:none; color:#888;" onclick="location.reload()">戻る</button>
    </div>

    <div id="home" class="screen">
        <h1>🏠 ホーム</h1>
        <p id="myid-disp" style="font-weight:bold; color:#06c755; font-size:24px;"></p>
        <button class="btn" style="background:#eee;" onclick="localStorage.clear();location.reload();">ログアウト</button>
    </div>

    <script>
        const SHEET = "https://script.google.com/macros/s/AKfycbw-E_MHkIPI8VjStwkUGjJOwdd1cPqoRJHHX-2LSt6ssL4J7bI4RXhqOjHw_WBS1KYNzw/exec";

        function toStep2() {
            if(document.getElementById('m-id').value.length < 6) return alert("IDは6文字以上にしてね");
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'flex';
        }

        // ログイン成功時
        function onLogin(res) {
            const user = JSON.parse(atob(res.credential.split('.')[1]));
            const id = document.getElementById('m-id').value;
            const name = document.getElementById('m-name').value || "名無し";

            // シートに送る
            fetch(`${SHEET}?email=${user.email}&id=${id}&name=${name}`, { mode: 'no-cors' });

            // 保存して再読み込み（これで無限ループを強制終了！）
            localStorage.setItem('m_id', id);
            location.reload(); 
        }

        // 読み込み時にログイン済みか判定
        window.onload = () => {
            const savedId = localStorage.getItem('m_id');
            if (savedId) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('myid-disp').innerText = "@" + savedId;
                document.getElementById('home').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
