<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メイン - Mizuki Message</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img id="my-icon-display" src="" alt="icon" onclick="showProfile()" style="width: 35px; height: 35px; border-radius: 50%; cursor: pointer;">
            <span id="welcome-message">...</span>
        </div>
        <button onclick="showSearch()">ID検索</button>
    </header>

    <div id="profile-section" class="container">
        <h2>プロフィール編集</h2>
        <div class="profile-edit">
            <img id="profile-preview" src="" style="width:100px; height:100px; border-radius:50%;">
            <input type="text" id="profile-img-url" placeholder="画像URLを入力">
            <textarea id="profile-bio" placeholder="自己紹介を書いてね"></textarea>
            <button onclick="saveProfile()">保存する</button>
        </div>
    </div>

    <div id="search-section" class="container" style="display:none;">
        <h2>友だち検索</h2>
        <div class="search-box">
            <input type="text" id="search-id-input" placeholder="相手のIDを入力">
            <button onclick="startChat()">チャット開始</button>
        </div>
    </div>

    <div id="chat-section" class="container" style="display:none;">
        <div class="chat-header">
            <button onclick="showSearch()">◀ 戻る</button>
            <span id="chat-partner-name">...</span>
        </div>
        <div class="chat-area" id="chat-area"></div>
        <div class="input-area">
            <input type="text" id="m-text" placeholder="メッセージ...">
            <button onclick="sendMessage()">送信</button>
        </div>
    </div>

    <script src="2.js"></script>
</body>
</html>
