<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mizu message</title>
    <style>
        /* 共通スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            overflow-x: hidden;
        }
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .active {
            display: block;
        }
        button {
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .hidden {
            display: none;
        }

        /* スタート画面 */
        #start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        #start-screen h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        #language-select {
            margin-bottom: 20px;
        }
        #language-select select {
            padding: 10px;
            font-size: 16px;
        }

        /* ID管理画面 */
        #id-screen {
            background-color: white;
            padding: 20px;
        }
        #id-screen h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        #id-input {
            width: 100%;
            margin-bottom: 10px;
        }
        #id-search {
            width: 100%;
            margin-bottom: 20px;
        }
        #user-list {
            list-style: none;
            padding: 0;
        }
        #user-list li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }

        /* 名前設定画面 */
        #name-screen {
            background-color: white;
            padding: 20px;
        }
        #name-screen h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        #name-input {
            width: 100%;
            margin-bottom: 20px;
        }

        /* メイン画面 */
        #main-screen {
            background-color: white;
        }
        .tab-bar {
            display: flex;
            justify-content: space-around;
            background-color: #f8f8f8;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 1px solid #ccc;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
        }
        .tab.active {
            background-color: #007bff;
            color: white;
        }
        .content {
            padding: 20px;
            padding-bottom: 80px;
        }

        /* 投稿画面 */
        #post-screen {
            background-color: white;
            padding: 20px;
        }
        #post-title {
            width: 100%;
            margin-bottom: 20px;
        }
        #post-media {
            margin-bottom: 20px;
        }
        #post-preview {
            max-width: 100%;
            margin-bottom: 20px;
        }

        /* メッセージ画面 */
        #message-screen {
            background-color: white;
        }
        .chat-list {
            padding: 20px;
            padding-bottom: 80px;
        }
        .chat-item {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }
        .chat-window {
            display: none;
            flex-direction: column;
            height: 100vh;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            position: relative;
        }
        .message.sent {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .message.received {
            background-color: #e9ecef;
        }
        .edit-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 12px;
            cursor: pointer;
        }
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        #message-text {
            flex: 1;
            margin-right: 10px;
        }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            color: #007bff;
            font-size: 18px;
        }

        /* プロフィール画面 */
        #profile-screen {
            background-color: white;
            padding: 20px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ccc;
            margin: 0 auto 10px;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .post-thumb {
            width: 100%;
            aspect-ratio: 1;
            background-color: #ccc;
        }

        /* レスポンシブ */
        @media (max-width: 600px) {
            .content {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- スタート画面 -->
    <div id="start-screen" class="screen active">
        <h1>mizu message</h1>
        <div id="language-select">
            <label for="lang">言語を選択:</label>
            <select id="lang">
                <option value="ja">日本語</option>
                <option value="en">English</option>
            </select>
        </div>
        <button id="start-btn">スタート</button>
    </div>

    <!-- ID管理画面 -->
    <div id="id-screen" class="screen">
        <h2>IDを作成または検索</h2>
        <input type="text" id="id-input" placeholder="IDを入力 (6-20文字、英数字のみ)">
        <button id="create-id-btn">IDを作成</button>
        <input type="text" id="id-search" placeholder="IDを検索">
        <ul id="user-list"></ul>
    </div>

    <!-- 名前設定画面 -->
    <div id="name-screen" class="screen">
        <h2>名前を設定</h2>
        <input type="text" id="name-input" placeholder="名前 (最大17文字)">
        <button id="set-name-btn">設定</button>
    </div>

    <!-- メイン画面 -->
    <div id="main-screen" class="screen">
        <div class="content" id="main-content">
            <!-- 投稿一覧など -->
            <div id="feed">
                <h3>フィード</h3>
                <div id="posts-list"></div>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab active" data-tab="feed">フィード</div>
            <div class="tab" data-tab="post">投稿</div>
            <div class="tab" data-tab="message">メッセージ</div>
            <div class="tab" data-tab="profile">プロフィール</div>
        </div>
    </div>

    <!-- 投稿画面 -->
    <div id="post-screen" class="screen">
        <h2>新規投稿</h2>
        <input type="text" id="post-title" placeholder="タイトル">
        <input type="file" id="post-media" accept="image/*,video/*">
        <div id="post-preview"></div>
        <button id="submit-post-btn">投稿</button>
        <button class="back-btn" onclick="showScreen('main-screen')">戻る</button>
    </div>

    <!-- メッセージ画面 -->
    <div id="message-screen" class="screen">
        <div class="chat-list">
            <h3>チャット</h3>
            <div id="chats-list"></div>
        </div>
        <div class="chat-window" id="chat-window">
            <button class="back-btn" onclick="showChatList()">戻る</button>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="message-text" placeholder="メッセージ">
                <input type="file" id="message-media" accept="image/*,video/*,audio/*,*/*">
                <button id="send-message-btn">送信</button>
            </div>
        </div>
    </div>

    <!-- プロフィール画面 -->
    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <div class="avatar"></div>
            <h3 id="profile-name"></h3>
            <p id="profile-id"></p>
        </div>
        <div class="posts-grid" id="profile-posts"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzVhlG2q9TdHjxyly5tT7mEYDqxAACV09BBcl0qgaXy/dev';
        let currentUser = null;
        let currentChatUser = null;
        let language = 'ja';

        // 言語設定
        document.getElementById('lang').addEventListener('change', (e) => {
            language = e.target.value;
            // ここで言語に応じてテキストを変更（簡易版）
        });

        // スタートボタン
        document.getElementById('start-btn').addEventListener('click', () => {
            showScreen('id-screen');
        });

        // ID作成
        document.getElementById('create-id-btn').addEventListener('click', async () => {
            const id = document.getElementById('id-input').value;
            if (!/^[a-zA-Z0-9]{6,20}$/.test(id)) {
                alert('IDは6-20文字の英数字のみです。');
                return;
            }
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'createUser', id }),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            if (result.success) {
                currentUser = { id };
                showScreen('name-screen');
            } else {
                alert('IDが既に存在します。');
            }
        });

        // ID検索
        document.getElementById('id-search').addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 3) return;
            const response = await fetch(`${API_URL}?action=searchUsers&query=${query}`);
            const users = await response.json();
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            users.forEach(user => {
                const li = document.createElement('li');
                li.textContent = `${user.id} - ${user.name}`;
                li.addEventListener('click', () => {
                    currentUser = user;
                    showScreen('main-screen');
                    loadFeed();
                });
                list.appendChild(li);
            });
        });

        // 名前設定
        document.getElementById('set-name-btn').addEventListener('click', async () => {
            const name = document.getElementById('name-input').value;
            if (name.length > 17) {
                alert('名前は17文字以内です。');
                return;
            }
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'updateUser', user: currentUser }),
                headers: { 'Content-Type': 'application/json' }
            });   saveData();
            }
            showScreen('main-screen');
            loadFeed();
        });

        // タブ切り替え
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                if (tabName === 'post') {
                    showScreen('post-screen');
                } else if (tabName === 'message') {
                    showScreen('message-screen');
                    loadChats();
                } else if (tabName === 'profile') {
                    showScreen('profile-screen');
                    loadProfile();
                } else {
                    showScreen('main-screen');
                    loadFeed();
                }
            });
        });

        // 投稿
        document.getElementById('post-media').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const preview = document.getElementById('post-preview');
                    if (file.type.startsWith('image/')) {
                        preview.innerHTML = `<img src="${reader.result}" style="max-width:100%;">`;
                    } else if (file.type.startsWith('video/')) {
                        preview.innerHTML = `<video controls style="max-width:100%;"><source src="${reader.result}"></video>`;
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('submit-post-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value;
            const mediaFile = document.getElementById('post-media').files[0];
            let media = null;
            if (mediaFile) {
                const reader = new FileReader();
                reader.onload = async () => {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'createPost', userId: currentUser.id, title, media }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    showScreen('main-screen');
                    loadFeed();
                };
                reader.readAsDataURL(mediaFile);
            } else {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'createPost', userId: currentUser.id, title }),
                    headers: { 'Content-Type': 'application/json' }
                }h({ id: Date.now(), userId: currentUser.id, title, timestamp: new Date().toISOString() });
                saveData();
                showScreen('main-screen');
                loadFeed();
            }
        });

        // メッセージ送信
        document.getElementById('send-message-btn').addEventListener('click', async () => {
            const text = document.getElementById('message-text').value;
            const mediaFile = document.getElementById('message-media').files[0];
            let media = null;
            if (mediaFile) {
                const reader = new FileReader();
                reader.onload = async () => {
                    media = reader.result;
                    await sendMessage(text, media);
                };
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'sendMessage', from: currentUser.id, to: currentChatUser.id, text, media }),
                headers: { 'Content-Type': 'application/json' }
            }
                await sendMessage(text);
            }
        });

        async function sendMessage(text, media = null) {
            messages.push({ id: Date.now(), from: currentUser.id, to: currentChatUser.id, text, media, timestamp: new Date().toISOString() });
            saveData();
            loadMessages();
            document.getElementById('message-text').value = '';
            document.getElementById('message-media').value = '';
        }

        // ユーティリティ関数
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showChatList() {
            document.querySelector('.chat-list').style.display = 'block';
            document.getElementById('chat-window').style.display = 'none';
        }
response = await fetch(`${API_URL}?action=getPosts`);
            const posts = await response.json();
            const list = document.getElementById('posts-list');
            list.innerHTML = '';
            posts.forEach(post => {
                const div = document.createElement('div');
                div.innerHTML = `<h4>${post.title}</h4><p>by ${post.userName
        }

        async function loadFeed() {
            const list = document.getElementById('posts-list');
            list.innerHTML = '';
            posts.forEach(post => {
                const user = users.find(u => u.id === post.userId);
                const div = document.createElement('div');
                div.innerHTML = `<h4>${post.title}</h4><p>by ${user ? user.name : post.userId}</p>`;
                if (post.media) {
                    if (post.media.startsWith('data:image/')) {
                        div.innerHTML += `<img src="${post.media}" style="max-width:100%;">`;
                    } else if (post.media.startsWith('data:video/')) {
                        div.innerHTML += `<video controls style="max-width:100%;"><source src="${post.media}"></video>`;
                    }
                }
                list.appendChild(div);
            });
        }

        async function loadChats() {
            const response = await fetch(`${API_URL}?action=getChats&userId=${currentUser.id}`);
            const chats = await response.json();
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.textContent = chat.name;
                div.addEventListener('click', () => showChat(chat));
                list.appendChild(div);
            });
        }

        async function loadMessages() {
            const response = await fetch(`${API_URL}?action=getMessages&from=${currentUser.id}&to=${currentChatUser.id}`);
            const messages = await response.json();
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.from === currentUser.id ? 'sent' : 'received'}`;
                div.textContent = msg.text;
                if (msg.media) {
                    if (msg.media.startsWith('data:image/')) {
                        div.innerHTML += `<img src="${msg.media}" style="max-width:100%;">`;
                    } else if (msg.media.startsWith('data:video/')) {
                        div.innerHTML += `<video controls style="max-width:100%;"><source src="${msg.media}"></video>`;
                    } else if (msg.media.startsWith('data:audio/')) {
                        div.innerHTML += `<audio controls><source src="${msg.media}"></audio>`;
                    }
                }
                if (msg.from === currentUser.id) {
                    const now = new Date();
                    const sentTime = new Date(msg.timestamp);
                    const diff = (now - sentTime) / (1000 * 60 * 60); // hours
                    if (diff <= 24) {
                        const editBtn = document.createElement('button');
                        editBtn.className = 'edit-btn';
                        editBtn.textContent = '編集';
                        editBtn.addEventListener('click', () => editMessage(msg.id, div));
                        div.appendChild(editBtn);
                    }
                }
                container.appendChild(div);
            });
        }

        function editMessage(msgId, msgDiv) {
            const currentText = msgDiv.textContent.replace('編集', '').trim();
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentText;
            input.style.width = '100%';
            msgDiv.innerHTML = '';
            msgDiv.appendChild(input);
            const saveBtn = document.createElement('button');
            saveBtn.textContent = '保存';
            saveBtn.addEventListener('click', async () => {
                const newText = input.value;
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'editMessage', id: msgId, text: newText }),
                    headers: { 'Content-Type': 'application/json' }
                });
                loadMessages();
            });
            msgDiv.appendChild(saveBtn);
        }

        async function loadProfile() {
            document.getElementById('profile-name').textContent = currentUser.name;
            document.getElementById('profile-id').textContent = currentUser.id;
            const response = await fetch(`${API_URL}?action=getUserPosts&userId=${currentUser.id}`);
            const posts = await response.json();
            const grid = document.getElementById('profile-posts');
            grid.innerHTML = '';
            posts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post-thumb';
                if (post.media && post.media.startsWith('data:image/')) {
                    div.style.backgroundImage = `url(${post.media})`;
                }
                grid.appendChild(div);
            });
        }
    </script>
</body>
</html>
